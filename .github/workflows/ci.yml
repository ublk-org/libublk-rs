name: Cargo Build

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - nightly
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        if: always() && matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
      - name: rustup update
        if: always() && true
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }} && rustup target add ${{ matrix.target }}
      - name: build without feature
        if: always() && true
        run: |
          cargo build --verbose --target ${{ matrix.target }}
      - name: build with feature
        if: always() && true
        run: |
          cargo build --features=fat_complete --verbose --target ${{ matrix.target }}
